workflows:
  nextcareer-android:
    name: NextCareer Android Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      node: 22
      java: 21
    scripts:
      - name: Install bun
        script: |
          npm install -g bun
      - name: Install dependencies
        script: |
          bun install
      - name: Build web bundle
        script: |
          bun run build
      - name: Sync Capacitor Android
        script: |
          mkdir -p android/app/src/main/assets/public
          npx cap sync android
      - name: Bump versionCode
        script: |
          sed -i.bak "s/versionCode 1/versionCode $BUILD_NUMBER/g" android/app/build.gradle
      - name: Set up signing
        script: |
          KEYSTORE="${CM_KEYSTORE_PATH:-$KEYSTORE_PATH}"
          if [ -n "$KEYSTORE" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "storeFile=$KEYSTORE" > android/key.properties
            echo "storePassword=$KEYSTORE_PASSWORD" >> android/key.properties
            echo "keyAlias=$KEY_ALIAS" >> android/key.properties
            echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          fi
      - name: Build release AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
