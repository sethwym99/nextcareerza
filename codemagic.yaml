workflows:
  nextcareer-android:
    name: NextCareer Android Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      node: 20
    scripts:
      - name: Install bun
        script: |
          npm install -g bun
      - name: Install dependencies
        script: |
          bun install
      - name: Build web bundle
        script: |
          bun run build
      - name: Sync Capacitor Android
        script: |
          npx cap sync android
      - name: Bump versionCode
        script: |
          sed -i.bak "s/versionCode 1/versionCode $CM_BUILD_ID/g" android/app/build.gradle
      - name: Build unsigned AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
